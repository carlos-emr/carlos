services:
  carlos:
    container_name: carlos-tomcat-dev
    build:
      context: ./development
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "18000:8000"
    volumes:
      - m2-volume:/root/.m2
      - ..:/workspace:cached
      - ../.devcontainer/db/db_data/:/db-data/
    env_file:
      - ./development/config/shared/local.env
    environment:
      LANG: en_US.UTF-8
      LANGUAGE: en_US:en
      TZ: America/Toronto
    networks:
      - carlos-network
    depends_on:
      db:
        condition: service_healthy
      drugref:
        condition: service_healthy

  drugref:
    container_name: carlos-drugref-dev
    build:
      context: ./drugref
      dockerfile: Dockerfile
      args:
        DRUGREF_REPO: ${DRUGREF_REPO:-https://github.com/open-osp/Open-Drugref.git}
        DRUGREF_BRANCH: ${DRUGREF_BRANCH:-main}
    ports:
      - "8180:8080"
    volumes:
      - ./development/config/shared/volumes/drugref2.properties:/root/drugref2.properties:ro
    environment:
      TZ: America/Toronto
    networks:
      - carlos-network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/drugref2/DrugrefService?wsdl"]
      timeout: 10s
      retries: 5
      interval: 30s
      start_period: 60s

  db:
    container_name: carlos-mariadb-dev
    build:
      context: ../
      dockerfile: .devcontainer/db/Dockerfile
    env_file:
      - ./development/config/shared/local.env
    ports:
      - "3306:3306"
    volumes:
      - mariadb-files:/var/lib/mysql
    environment:
      TZ: America/Toronto
      container: docker
    networks:
      - carlos-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      timeout: 20s
      retries: 10
      interval: 10s
      start_period: 60s

  # Medplum FHIR R4 Server — clinical data store (Phase 0 of MySQL→FHIR migration)
  medplum-postgres:
    container_name: carlos-medplum-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: medplum
      POSTGRES_USER: medplum
      POSTGRES_PASSWORD: medplum
      TZ: America/Toronto
    ports:
      - "5432:5432"
    volumes:
      - medplum-postgres-data:/var/lib/postgresql/data
    networks:
      - carlos-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medplum -d medplum"]
      timeout: 10s
      retries: 5
      interval: 10s
      start_period: 30s

  medplum-redis:
    container_name: carlos-medplum-redis
    image: redis:7-alpine
    environment:
      TZ: America/Toronto
    ports:
      - "6379:6379"
    networks:
      - carlos-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 5s
      retries: 5
      interval: 10s
      start_period: 10s

  medplum-server:
    container_name: carlos-medplum-server
    image: medplum/medplum-server:latest
    ports:
      - "8103:8103"
    environment:
      NODE_ENV: development
      MEDPLUM_PORT: 8103
      MEDPLUM_BASE_URL: "http://medplum-server:8103/"
      MEDPLUM_DATABASE_HOST: medplum-postgres
      MEDPLUM_DATABASE_PORT: 5432
      MEDPLUM_DATABASE_DBNAME: medplum
      MEDPLUM_DATABASE_USERNAME: medplum
      MEDPLUM_DATABASE_PASSWORD: medplum
      MEDPLUM_REDIS_HOST: medplum-redis
      MEDPLUM_REDIS_PORT: 6379
      MEDPLUM_MAX_JSON_SIZE: "16mb"
      TZ: America/Toronto
    networks:
      - carlos-network
    depends_on:
      medplum-postgres:
        condition: service_healthy
      medplum-redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8103/healthcheck').then(r=>{if(!r.ok)throw 1})"]
      timeout: 10s
      retries: 10
      interval: 15s
      start_period: 60s

volumes:
  mariadb-files:
    driver: local

  m2-volume:
    driver: local

  medplum-postgres-data:
    driver: local

networks:
  carlos-network:
    driver: bridge
    name: carlos-network
