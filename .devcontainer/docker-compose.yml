services:
  carlos:
    container_name: carlos-tomcat-dev
    build:
      context: ./development
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "18000:8000"
    volumes:
      - m2-volume:/root/.m2
      - ..:/workspace:cached
      - ../.devcontainer/db/db_data/:/db-data/
    env_file:
      - ./development/config/shared/local.env
    environment:
      LANG: en_US.UTF-8
      LANGUAGE: en_US:en
      TZ: America/Toronto
    # ─── AI Security: Network Policy ──────────────────────────────────────────
    # NET_ADMIN is required so that setup-network-policy.sh can apply iptables
    # rules inside the container at startup.  Those rules block outbound
    # MySQL/MariaDB connections to any host other than the devcontainer's own
    # `db` service, preventing Claude Code from inadvertently (or maliciously)
    # connecting to an external or production database.
    #
    # NET_ADMIN is scoped to the container's own network namespace and cannot
    # affect the host's routing or firewall tables.
    #
    # See .devcontainer/security/README.md for full details.
    cap_add:
      - NET_ADMIN

    # ─── AI Security: AppArmor MAC Profile (opt-in) ───────────────────────────
    # Uncomment the block below to apply the custom AppArmor kernel profile.
    # Requires AppArmor to be available on the host (Linux only) and the
    # profile to be pre-loaded:
    #
    #   sudo bash .devcontainer/security/load-apparmor-host.sh
    #
    # The profile adds a kernel-level backstop for:
    #   - Write access to .git/ and .github/workflows/ (defence-in-depth)
    #   - Write access to seed SQL files
    #   - Dangerous capabilities (sys_admin, sys_module, sys_rawio, etc.)
    #
    # security_opt:
    #   - apparmor:carlos-dev-container

    networks:
      - carlos-network
    depends_on:
      db:
        condition: service_healthy
      drugref:
        condition: service_healthy

  drugref:
    container_name: carlos-drugref-dev
    build:
      context: ./drugref
      dockerfile: Dockerfile
      args:
        DRUGREF_REPO: ${DRUGREF_REPO:-https://github.com/open-osp/Open-Drugref.git}
        DRUGREF_BRANCH: ${DRUGREF_BRANCH:-main}
    ports:
      - "8180:8080"
    volumes:
      - ./development/config/shared/volumes/drugref2.properties:/root/drugref2.properties:ro
    environment:
      TZ: America/Toronto
    networks:
      - carlos-network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/drugref2/DrugrefService?wsdl"]
      timeout: 10s
      retries: 5
      interval: 30s
      start_period: 60s

  db:
    container_name: carlos-mariadb-dev
    build:
      context: ../
      dockerfile: .devcontainer/db/Dockerfile
    env_file:
      - ./development/config/shared/local.env
    ports:
      - "3306:3306"
    volumes:
      - mariadb-files:/var/lib/mysql
    environment:
      TZ: America/Toronto
      container: docker
    networks:
      - carlos-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      timeout: 20s
      retries: 10
      interval: 10s
      start_period: 60s

volumes:
  mariadb-files:
    driver: local

  m2-volume:
    driver: local

networks:
  carlos-network:
    driver: bridge
    name: carlos-network
