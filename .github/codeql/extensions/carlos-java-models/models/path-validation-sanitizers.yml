# PathValidationUtils - Path Traversal Sanitizer Models
#
# Registers PathValidationUtils methods as explicit summaryModel entries so that
# CodeQL uses these models instead of analyzing the method bodies. Each entry
# specifies ONLY the safe argument (the application-controlled allowed directory)
# as the source for the return value, which means taint from user-controlled
# arguments (e.g. a user-provided filename) does NOT propagate to the return value.
#
# These methods validate/sanitize file paths and throw SecurityException on invalid
# input, making their return values safe from path traversal (CWE-022).
#
# summaryModel format (10 columns):
#   [package, type, isInterface, name, signature, ext, input, output, kind, provenance]
#
# Fully-qualified Java type names are required in signatures:
#   java.lang.String  (not String)
#   java.io.File      (not File)
#
# See: src/main/java/io/github/carlos_emr/carlos/utility/PathValidationUtils.java

extensions:

  # summaryModel entries replace body analysis for these methods.
  # By only modelling flows from safe (application-controlled) arguments to the
  # return value — and deliberately omitting user-controlled arguments — CodeQL
  # will not propagate taint through these sanitizer methods.
  - addsTo:
      pack: codeql/java-all
      extensible: summaryModel
    data:
      # validatePath(String userFilename, File allowedDir) -> File
      # Sanitizes the user-provided filename and constructs a safe path within
      # allowedDir. The return value is bounded by allowedDir (Argument[1]); the
      # user-provided filename (Argument[0]) is intentionally NOT modelled as a
      # flow source so that taint from it is cut off at the sanitizer boundary.
      - ["io.github.carlos_emr.carlos.utility", "PathValidationUtils", False, "validatePath", "(java.lang.String,java.io.File)", "", "Argument[1]", "ReturnValue", "taint", "manual"]

      # validateExistingPath(File file, File allowedDir) -> File
      # Validates that file is within allowedDir and returns it. The return value
      # is guaranteed to be within allowedDir (Argument[1]); modelling only that
      # argument prevents taint from a possibly-tainted file path (Argument[0])
      # propagating past the sanitizer boundary.
      - ["io.github.carlos_emr.carlos.utility", "PathValidationUtils", False, "validateExistingPath", "(java.io.File,java.io.File)", "", "Argument[1]", "ReturnValue", "taint", "manual"]

      # validateUpload(File sourceFile) -> File
      # Validates that the uploaded file (a framework-assigned temp path, not
      # user-controlled) resides in an allowed temp directory and returns the
      # canonicalized File. Argument[0] flows to ReturnValue because the source
      # path is system-assigned by Struts2/Tomcat and is not user-controlled.
      - ["io.github.carlos_emr.carlos.utility", "PathValidationUtils", False, "validateUpload", "(java.io.File)", "", "Argument[0]", "ReturnValue", "taint", "manual"]

      # validateUpload(File sourceFile, String userFilename, File destDir) -> File
      # End-to-end upload validation: validates source, sanitizes the user-provided
      # filename, and constructs a safe destination within destDir. The return value
      # is bounded by destDir (Argument[2]); the user-provided filename (Argument[1])
      # is intentionally NOT modelled as a flow source.
      - ["io.github.carlos_emr.carlos.utility", "PathValidationUtils", False, "validateUpload", "(java.io.File,java.lang.String,java.io.File)", "", "Argument[2]", "ReturnValue", "taint", "manual"]

  # neutralModel entries suppress any auto-generated models for methods that return
  # a non-reference type (boolean) where no taint flow to ReturnValue is relevant.
  - addsTo:
      pack: codeql/java-all
      extensible: neutralModel
    data:
      # isInAllowedTempDirectory(File file) -> boolean
      # Guard predicate only; returns boolean with no relevant taint-flow to callers.
      - ["io.github.carlos_emr.carlos.utility", "PathValidationUtils", "isInAllowedTempDirectory", "(java.io.File)", "summary", "manual"]
