name: Snyk Security Scan
on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop]

jobs:
  snyk-dependencies:
    name: Dependency Vulnerabilities (SCA)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Snyk Open Source scan
        uses: snyk/actions/maven-3-jdk-21@v1
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --sarif-file-output=snyk-sca.sarif

      - name: Upload SCA results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-sca.sarif

  snyk-code:
    name: Source Code Vulnerabilities (SAST)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Snyk Code scan
        uses: snyk/actions/maven-3-jdk-21@v1
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --sarif-file-output=snyk-code.sarif

      - name: Upload SAST results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-code.sarif
