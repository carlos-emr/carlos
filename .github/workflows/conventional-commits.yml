# GitHub Workflow: Conventional Commits Check
#
# Description:
# Checks whether commit messages in a pull request follow the Conventional
# Commits specification (https://www.conventionalcommits.org/).
#
# This check is INFORMATIONAL — it will never block a PR from merging. It
# provides a green checkmark when all commits follow the format, and helpful
# guidance when they don't. Do NOT add this as a required status check.
#
# Accepted types: feat, fix, docs, style, refactor, perf, test, build,
#                 ci, chore, revert
#
# No third-party actions are used beyond actions/checkout. The check is
# implemented as a shell script to minimize supply chain risk.
#
# License:
# This GitHub Workflow file is part of the Carlos EMR project and is subject
# to the licensing terms outlined in the repository's LICENSE file.

name: Conventional Commits

on:
  pull_request:
    branches:
      - main
      - develop
      - experimental
      - staging/*
      - hotfix/*
      - community/*/develop
      - community/*/staging/*

jobs:
  conventional-commits:
    name: Commit Message Format
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit message format
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "Checking commits ${BASE_SHA:0:7}..${HEAD_SHA:0:7} for Conventional Commits format..."
          echo ""

          # Conventional Commits pattern:
          #   type(optional-scope): description
          #   type: description
          # With optional ! for breaking changes
          # Scope is restricted to any characters except ')' to avoid overly greedy matching
          PATTERN="^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([^)]*\))?!?: .+"

          # Also accept merge commits (generated by GitHub/git)
          MERGE_PATTERN="^Merge (branch|pull request|remote-tracking)"

          non_conforming=()
          total=0
          passed=0

          for sha in $(git rev-list "$BASE_SHA".."$HEAD_SHA"); do
            total=$((total + 1))
            subject=$(git log -1 --format="%s" "$sha")
            short=$(git log -1 --format="%h" "$sha")

            if echo "$subject" | grep -qE "$PATTERN"; then
              passed=$((passed + 1))
            elif echo "$subject" | grep -qE "$MERGE_PATTERN"; then
              # Merge commits are fine, don't count as non-conforming
              passed=$((passed + 1))
            else
              non_conforming+=("$short $subject")
            fi
          done

          echo "Checked $total commit(s): $passed follow Conventional Commits format"
          echo ""

          if [ ${#non_conforming[@]} -gt 0 ]; then
            echo "::notice::Some commits don't follow Conventional Commits format (this is informational, not blocking)"
            echo ""
            echo "The following commit(s) don't match the expected format:"
            echo ""
            for entry in "${non_conforming[@]}"; do
              echo "  - $entry"
            done
            echo ""
            echo "──────────────────────────────────────────────────────────"
            echo "CARLOS uses Conventional Commits for clear change history."
            echo ""
            echo "Format:  type: description"
            echo "  or:    type(scope): description"
            echo ""
            echo "Accepted types:"
            echo "  feat      A new feature"
            echo "  fix       A bug fix"
            echo "  docs      Documentation changes"
            echo "  style     Formatting, whitespace (no code change)"
            echo "  refactor  Code restructuring (no feature/fix)"
            echo "  perf      Performance improvement"
            echo "  test      Adding or updating tests"
            echo "  build     Build system or dependency changes"
            echo "  ci        CI/CD configuration changes"
            echo "  chore     Maintenance tasks"
            echo "  revert    Reverting a previous commit"
            echo ""
            echo "Examples:"
            echo "  feat: add patient allergy search filter"
            echo "  fix: correct date formatting in lab results"
            echo "  refactor: simplify caseload infinite scroll detection"
            echo "  docs: add deployment guide for BC clinics"
            echo ""
            echo "Learn more: https://www.conventionalcommits.org/"
            echo "See also:   CONTRIBUTING.md → Commit Message Format"
            echo "──────────────────────────────────────────────────────────"
          else
            echo "All commits follow Conventional Commits format."
          fi

          # Always exit 0 — this check is informational, never blocking
          exit 0
