# GitHub Workflow: PMD Static Analysis
#
# Description:
# Runs PMD static analysis on CARLOS EMR Java source code to detect
# common programming flaws, potential bugs, and security issues.
# Results appear in the GitHub Security tab (SARIF upload).
#
# Runs PMD CLI directly (no third-party action) to avoid org action
# allow-list restrictions. PMD only needs source code, not compilation.
#
# Ruleset:
# Uses a project-specific ruleset (.github/pmd/carlos-ruleset.xml) focused on
# error-prone patterns, security issues, and best practices. Style/naming rules
# are intentionally excluded to avoid noise on legacy code.
#
# Usage:
# - Triggered on pull requests targeting develop, main, experimental
# - Triggered on pushes to develop
# - Scheduled weekly full scan (Monday 5:00 UTC)
# - Manual dispatch available
#
# License:
# This GitHub Workflow file is part of the Carlos EMR project and is subject
# to the licensing terms outlined in the repository's LICENSE file.
#
# Last Updated:
# April 2026

name: PMD Analysis

on:
  pull_request:
    branches:
      - main
      - develop
      - experimental
    paths:
      - '**.java'
      - '.github/pmd/**'
      - '.github/workflows/pmd.yml'
  push:
    branches: [develop]
    paths:
      - '**.java'
      - '.github/pmd/**'
      - '.github/workflows/pmd.yml'
  workflow_dispatch: {}
  schedule:
    - cron: '0 5 * * 1'  # Monday 5:00 UTC (weekly full scan)

permissions:
  contents: read
  security-events: write

env:
  PMD_VERSION: '7.13.0'

jobs:
  pmd:
    name: PMD Static Analysis
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache PMD installation
        uses: actions/cache@v4
        with:
          path: pmd-bin-${{ env.PMD_VERSION }}
          key: pmd-${{ runner.os }}-${{ runner.arch }}-${{ env.PMD_VERSION }}
          restore-keys: |
            pmd-${{ runner.os }}-${{ runner.arch }}-
            pmd-${{ runner.os }}-

      - name: Download PMD
        run: |
          set -euo pipefail
          if [ ! -d "pmd-bin-${PMD_VERSION}" ]; then
            echo "Downloading PMD ${PMD_VERSION}..."
            PMD_ZIP="pmd-dist-${PMD_VERSION}-bin.zip"
            PMD_BASE_URL="https://github.com/pmd/pmd/releases/download/pmd_releases%2F${PMD_VERSION}"
            CHECKSUM_FILE="${PMD_ZIP}.sha256"
            wget -q "${PMD_BASE_URL}/${PMD_ZIP}"
            if ! wget -O "${CHECKSUM_FILE}" "${PMD_BASE_URL}/${PMD_ZIP}.sha256"; then
              echo "Failed to download checksum file for ${PMD_ZIP}" >&2
              rm -f "${PMD_ZIP}" "${CHECKSUM_FILE}"
              exit 1
            fi
            EXPECTED_SHA256="$(awk '{print $1}' "${CHECKSUM_FILE}" | tr -d '\r\n')"
            rm -f "${CHECKSUM_FILE}"
            if [ -z "${EXPECTED_SHA256}" ]; then
              echo "Downloaded checksum file for ${PMD_ZIP} is empty or malformed" >&2
              rm -f "${PMD_ZIP}"
              exit 1
            fi
            ACTUAL_SHA256="$(sha256sum "${PMD_ZIP}" | awk '{print $1}')"
            if [ "${ACTUAL_SHA256}" != "${EXPECTED_SHA256}" ]; then
              echo "Checksum verification failed for ${PMD_ZIP}" >&2
              echo "Expected: ${EXPECTED_SHA256}" >&2
              echo "Actual:   ${ACTUAL_SHA256}" >&2
              rm -f "${PMD_ZIP}"
              exit 1
            fi
            echo "Checksum verification passed for ${PMD_ZIP}"
            unzip -q "${PMD_ZIP}"
            rm -f "${PMD_ZIP}"
          else
            echo "PMD ${PMD_VERSION} already cached"
          fi

      - name: Run PMD analysis
        id: pmd
        run: |
          set +e
          ./pmd-bin-${PMD_VERSION}/bin/pmd check \
            --dir src/main/java \
            -R .github/pmd/carlos-ruleset.xml \
            --format sarif \
            --report-file pmd-report.sarif \
            --no-progress
          PMD_EXIT=$?
          set -e

          # PMD exit codes: 0=no violations, 4=violations found, other=error
          if [ "$PMD_EXIT" -eq 0 ]; then
            echo "violations=0" >> "$GITHUB_OUTPUT"
            echo "No PMD violations found."
          elif [ "$PMD_EXIT" -eq 4 ]; then
            COUNT=$(python3 -c "import json; data=json.load(open('pmd-report.sarif')); print(sum(len(run.get('results', [])) for run in data.get('runs', [])))" || echo "unknown")
            echo "violations=${COUNT}" >> "$GITHUB_OUTPUT"
            echo "PMD found ${COUNT} violation(s)."
          else
            echo "violations=error" >> "$GITHUB_OUTPUT"
            echo "::error::PMD exited with unexpected code ${PMD_EXIT}"
            exit 1
          fi

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('pmd-report.sarif') != ''
        with:
          sarif_file: pmd-report.sarif
          category: pmd

      - name: Report summary
        if: always()
        run: |
          echo "### PMD Analysis Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          VIOLATIONS="${{ steps.pmd.outputs.violations }}"
          if [ "$VIOLATIONS" = "0" ]; then
            echo "No violations detected." >> "$GITHUB_STEP_SUMMARY"
          elif [ -n "$VIOLATIONS" ] && [ "$VIOLATIONS" != "error" ]; then
            echo "- **Violations found**: ${VIOLATIONS}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "See the **Security** tab for details." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "PMD analysis did not complete successfully." >> "$GITHUB_STEP_SUMMARY"
          fi
