# GitHub Workflow: PMD Static Analysis
#
# Description:
# Runs PMD static analysis on CARLOS EMR Java source code to detect
# common programming flaws, potential bugs, and security issues.
# Results appear in the GitHub Security tab (SARIF upload).
#
# Runs PMD CLI directly (no third-party action) to avoid org action
# allow-list restrictions. PMD only needs source code, not compilation.
#
# Ruleset:
# Uses a project-specific ruleset (.github/pmd/carlos-ruleset.xml) focused on
# error-prone patterns, security issues, and best practices. Style/naming rules
# are intentionally excluded to avoid noise on legacy code.
#
# Usage:
# - Triggered on pull requests targeting develop, main, experimental
# - Triggered on pushes to develop
# - Scheduled weekly full scan (Monday 5:00 UTC)
# - Manual dispatch available
#
# License:
# This GitHub Workflow file is part of the Carlos EMR project and is subject
# to the licensing terms outlined in the repository's LICENSE file.
#
# Last Updated:
# April 2026

name: PMD Analysis

on:
  pull_request:
    branches:
      - main
      - develop
      - experimental
    paths:
      - '**.java'
      - '.github/pmd/**'
      - '.github/workflows/pmd.yml'
  push:
    branches: [develop]
    paths:
      - '**.java'
      - '.github/pmd/**'
      - '.github/workflows/pmd.yml'
  workflow_dispatch: {}
  schedule:
    - cron: '0 5 * * 1'  # Monday 5:00 UTC (weekly full scan)

permissions:
  contents: read
  security-events: write

env:
  PMD_VERSION: '7.13.0'
  PMD_DIR: 'pmd-bin-7.13.0'

jobs:
  pmd:
    name: PMD Static Analysis
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Java 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache PMD installation
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ env.PMD_DIR }}
          key: pmd-${{ runner.os }}-${{ runner.arch }}-${{ env.PMD_VERSION }}
          restore-keys: |
            pmd-${{ runner.os }}-${{ runner.arch }}-
            pmd-${{ runner.os }}-

      - name: Download PMD
        run: |
          set -euo pipefail
          if [ ! -d "${PMD_DIR}" ]; then
            echo "Downloading PMD ${PMD_VERSION}..."
            PMD_ZIP="pmd-dist-${PMD_VERSION}-bin.zip"
            PMD_BASE_URL="https://github.com/pmd/pmd/releases/download/pmd_releases%2F${PMD_VERSION}"
            wget -q "${PMD_BASE_URL}/${PMD_ZIP}"
            unzip -q "${PMD_ZIP}"
            rm -f "${PMD_ZIP}"
          else
            echo "PMD ${PMD_VERSION} already cached"
          fi

      - name: Run PMD
        run: |
          set -euo pipefail
          "${PMD_DIR}/bin/pmd" check \
            --dir src/main/java \
            --dir src/test/java \
            --rulesets .github/pmd/carlos-ruleset.xml \
            --format sarif \
            --report-file pmd-report.sarif \
            --no-fail-on-violation

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@0daab03d71ff584ef619d027a3fd9146679c5d84
        if: >
          always() &&
          hashFiles('pmd-report.sarif') != '' &&
          (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        with:
          sarif_file: pmd-report.sarif
          category: pmd

      - name: Report summary
        if: always()
        run: |
          echo "### PMD Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f pmd-report.sarif ]; then
            total=$(jq '[.runs[].results[]?] | length' pmd-report.sarif)
            echo "PMD produced ${total} SARIF finding(s)." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No PMD SARIF report was generated." >> "$GITHUB_STEP_SUMMARY"
          fi
