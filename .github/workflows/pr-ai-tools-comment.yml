name: PR AI Tools Comment

on:
  pull_request:
    types: [opened]

jobs:
  add-ai-tools-comment:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Add AI Tools Info Comment
        uses: actions/github-script@v7
        with:
          script: |
            const body = `> **AI & CI Tools Available** — Use \`@claude\` or \`@coderabbitai\` in comments for assistance.

<details>
<summary><b>Available Commands & Automation</b></summary>

### Interactive Commands (Comment-Triggered)

| Command | Where to Use | What It Does |
|---------|--------------|--------------|
| \`@claude <request>\` | PR comments, issues | Claude Code AI assistance - implementation, refactoring, analysis |
| \`@coderabbitai <command>\` | PR comments | On-demand code review, security analysis |

### Automatic CI (Runs on All PRs)

| Tool | Trigger | What It Does |
|------|---------|--------------|
| **Claude Code Review** | PR open/update | Automatic AI code review |
| **Dependency Review** | PR to protected branches | Scans for vulnerable dependencies |
| **Maven Build & Test** | PR to main/develop | Builds project, runs all tests |

### Issue Lifecycle Keywords

| Keyword | Who Can Use | Effect |
|---------|-------------|--------|
| \`verified\`, \`fixed\`, \`works\` | Issue author | Auto-closes issue with \`verified-fixed\` label |
| \`not fixed\`, \`still broken\` | Issue author | Adds \`fix-failed\` label |

### PR-to-Issue Linking

| Pattern | Effect |
|---------|--------|
| \`Fixes #123\`, \`Closes #456\`, \`Resolves #789\` | Links PR to issue, notifies author on merge |

### IDE Tools

| Tool | How to Use |
|------|------------|
| **GitHub Copilot** | IDE extension with custom instructions in \`.github/copilot-instructions.md\` |

</details>`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: body
            });
