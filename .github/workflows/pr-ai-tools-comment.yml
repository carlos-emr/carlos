# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║                        SECURITY-CRITICAL WORKFLOW                         ║
# ╠═══════════════════════════════════════════════════════════════════════════╣
# ║  This workflow uses `pull_request_target` which has WRITE ACCESS to the   ║
# ║  repository, even for PRs from forks. This is ONLY safe because:          ║
# ║                                                                           ║
# ║  1. We DO NOT checkout any code from the PR/fork                          ║
# ║  2. We DO NOT run any code from the PR/fork                               ║
# ║  3. We DO NOT use any user-controlled input in shell commands             ║
# ║  4. We ONLY read a static file from the DEFAULT BRANCH                    ║
# ║  5. We ONLY post a static comment to the PR                               ║
# ║                                                                           ║
# ╠═══════════════════════════════════════════════════════════════════════════╣
# ║  ⚠️  DO NOT ADD ANY OF THE FOLLOWING TO THIS WORKFLOW:                    ║
# ║                                                                           ║
# ║  ❌ actions/checkout with PR ref (e.g., github.event.pull_request.head)   ║
# ║  ❌ Any `run:` command that uses PR title, body, branch name, or labels   ║
# ║  ❌ Any script that executes code from the PR                             ║
# ║  ❌ Any action that processes files from the PR branch                    ║
# ║                                                                           ║
# ║  Adding any of the above creates a critical security vulnerability that   ║
# ║  allows malicious PRs to steal secrets or compromise the repository.      ║
# ║                                                                           ║
# ║  See: https://securitylab.github.com/research/github-actions-preventing-  ║
# ║       pwn-requests/                                                       ║
# ╚═══════════════════════════════════════════════════════════════════════════╝

name: PR AI Tools Comment

on:
  # pull_request_target runs workflow from DEFAULT BRANCH (not the PR branch)
  # This is safe for static comments but dangerous if you checkout/run PR code
  pull_request_target:
    types: [opened]

jobs:
  add-ai-tools-comment:
    runs-on: ubuntu-latest
    permissions:
      contents: read       # To read the markdown file from repo
      pull-requests: write # To post the comment
    steps:
      # SAFE: Checkout DEFAULT BRANCH only (not the PR branch)
      # This gets our static markdown file, NOT any code from the fork
      - name: Checkout default branch (NOT the PR)
        uses: actions/checkout@v4
        with:
          # Explicitly use the base repo's default branch, NOT the PR
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: |
            .github/pr-ai-tools-comment.md
          sparse-checkout-cone-mode: false

      - name: Post AI Tools Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('.github/pr-ai-tools-comment.md', 'utf8');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: body
            });
