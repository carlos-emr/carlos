# Custom Semgrep rule: CRLF Log Injection with LogSanitizer sanitizer
#
# Replaces the three built-in CRLF injection rules that generate ~128 false
# positives across 24 files already protected by LogSanitizer.sanitize():
#   - java.servlets.security.crlf-injection-logs-deepsemgrep.crlf-injection-logs-deepsemgrep
#   - java.servlets.security.crlf-injection-logs.crlf-injection-logs
#   - java.lang.security.audit.crlf-injection-logs.crlf-injection-logs
#
# Those built-in rules must be disabled in Semgrep Cloud policy (app.semgrep.dev)
# so that only this custom rule runs for CRLF log injection detection.
#
# See: https://github.com/carlos-emr/carlos/issues/1432

rules:
  - id: carlos.crlf-injection-logs
    message: >
      When data from an untrusted source is put into a logger and not
      neutralized correctly, an attacker could forge log entries or
      include malicious content. Use LogSanitizer.sanitize() to escape
      control characters before logging user-supplied values.
    severity: ERROR
    languages: [java]
    mode: taint
    metadata:
      category: security
      cwe:
        - "CWE-117: Improper Output Neutralization for Logs"
      confidence: HIGH
      references:
        - https://owasp.org/www-community/attacks/Log_Injection

    pattern-sources:
      - patterns:
          - pattern: (HttpServletRequest $REQ).$METHOD(...)
          - metavariable-regex:
              metavariable: $METHOD
              regex: (getParameter|getQueryString|getHeader|getRequestURI|getPathInfo|getCookies|getRemoteAddr)

    pattern-sanitizers:
      # LogSanitizer methods (short name — covers static imports and same-package usage)
      - pattern: LogSanitizer.sanitize(...)
      # Fully-qualified name (covers cross-package usage)
      - pattern: io.github.carlos_emr.carlos.utility.LogSanitizer.sanitize(...)

    pattern-sinks:
      - pattern: $LOG.info(...)
      - pattern: $LOG.debug(...)
      - pattern: $LOG.warn(...)
      - pattern: $LOG.error(...)
      - pattern: $LOG.trace(...)
