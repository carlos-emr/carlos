#demographicExtJScript=
DEMOGRAPHIC_PROGRAM_ADMISSIONS=false
DEMOGRAPHIC_PATIENT_CLINIC_STATUS=true
ENABLE_EMERGENCY_PRIVATE_CONTACT_FIELD=true
DEMOGRAPHIC_PATIENT_ROSTERING=true
DEMOGRAPHIC_PATIENT_HEALTH_CARE_TEAM=true
NEW_CONTACTS_UI_EXTERNAL_CONTACT=false
NEW_CONTACTS_UI=false
DEMOGRAPHIC_WAITING_LIST=false
ENABLE_CHART_JOINING=true
ENABLE_PATIENT_NEWSLETTER=false
hctype=ON
caisi.registration_intake.updateMRPOnSave=true
enable_create_child_record=true
