#### |  System identification for CIHI data exports, OMD compliance reporting, and         |
#### |  multi-office administration.                                                       |
#### |                                                                                     |
#### |  vendorId                Vendor identifier for CIHI and OMD reporting.              |
#### |  vendorBusinessName      Official business name of the EMR vendor.                  |
#### |  vendorCommonName        Common/display name of the EMR vendor.                     |
#### |  softwareName            Official software product name for reporting.              |
#### |  softwareCommonName      Common/display name of the software product.               |
#### |  version                 Software version number for reporting.                     |
#### |  versionDate             Date of the current software version.                      |
#### |  multioffice.admin.role.name                                                        |
#### |                          Role name for the super-admin in multi-site environments.  |
#### |                                                                                     |
#### +-------------------------------------------------------------------------------------+

vendorId=vendorId not set
vendorBusinessName=CARLOS EMR
vendorCommonName=CARLOS EMR
softwareName=CARLOS EMR
softwareCommonName=CARLOS-EMR
version=version not set
versionDate=versionDate not set
multioffice.admin.role.name=admin



#### +-------------------------------------------------------------------------------------+
#### |  26. MISCELLANEOUS                                                                  |
#### +-------------------------------------------------------------------------------------+
#### |                                                                                     |
#### |  Settings that do not fit neatly into other categories: clinical decision support,  |
#### |  CKD notifications, referral validation, Hamilton Public Health, log purge,         |
#### |  prenatal screening, and waitlist defaults.                                         |
#### |                                                                                     |
#### |  mrp_model               yes|no -- yes = MRP-based model (patients assigned to      |
#### |                          a Most Responsible Provider), no = provider-per-appointment|
#### |                          model (provider determined by each appointment).           |
#### |  ckd_notification_scheme Notification for CKD alerts: tickler|dsa.                  |
#### |  ckd_notification_receiver                                                          |
#### |                          Provider number that receives CKD notification ticklers.   |
#### |  ckd_flowsheet           Flowsheet name for CKD tracking. e.g., diabetes.           |
#### |  wl_default_issue        true|false -- Assign default issue to waitlist patients    |
#### |                          when no notes exist.                                       |
#### |  decision_support_dir    Directory for external billing rule XML files.             |
#### |  decision_support_files  Comma-separated billing rule XML filenames.                |
#### |                                                                                     |
#### |  referral_no.msg         Validation error message for invalid referral numbers.     |
#### |  referral_no.pattern     Regex for validating referral numbers.                     |
#### |  admin.hph               true|false -- Hamilton Public Health services integration. |
#### |                                                                                     |
#### |  log.purge.minDays       Minimum days to retain log entries before purging.         |
#### |  log.purge.mysqldump     Path to mysqldump binary for log backup before purge.      |
#### |                                                                                     |
#### |  prenatal_screening_eform_group                                                     |
#### |                          EForm group for prenatal screening: IPS (Integrated        |
#### |                          Prenatal Screening), FTS (First Trimester Screening).      |
#### |  prenatal_screening_name Display name for prenatal screening program.               |
#### |  prenatal_screening_abbrv                                                           |
#### |                          Abbreviation for prenatal screening program.               |
#### |                                                                                     |
#### +-------------------------------------------------------------------------------------+

mrp_model=no
#ckd_notification_scheme=dsa
ckd_notification_scheme=tickler
#ckd_notification_receiver=1
#ckd_flowsheet=diabetes
wl_default_issue=false
#decision_support_dir=
#decision_support_files=
referral_no.msg=Must be an integer
referral_no.pattern=^[a-zA-Z0-9]*$
admin.hph=false
log.purge.minDays=7
log.purge.mysqldump=/usr/bin/mysqldump
prenatal_screening_eform_group=IPS
prenatal_screening_name=Integrated Prenatal Screening
prenatal_screening_abbrv=IPS
