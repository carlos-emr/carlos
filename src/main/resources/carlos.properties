#### |  24. PRINTING, PDF & QR CODES                                                       |
#### +-------------------------------------------------------------------------------------+
#### |                                                                                     |
#### |  PDF generation (wkhtmltopdf), QR code rendering, label printing, and print         |
#### |  report options.                                                                    |
#### |                                                                                     |
#### |  WKHTMLTOPDF_COMMAND     Path to wkhtmltopdf binary. Must not be null.              |
#### |  WKHTMLTOPDF_ARGS        Space-delimited arguments controlling rendering:           |
#### |                          local file access, font size, media type, encoding,        |
#### |                          margins, and JavaScript execution.                         |
#### |                                                                                     |
#### |  QR_CODE_ERROR_CORRECTION_LEVEL                                                     |
#### |                          Maps to zxing ErrorCorrectionLevel.                        |
#### |                          L (7% recovery), M (15%), Q (25%), H (30%).                |
#### |  QR_CODE_ENABLED_PROVIDER_DEFAULT                                                   |
#### |                          true|false -- QR codes enabled by default for providers.   |
#### |  QR_CODE_IMAGE_SCALE_FACTOR                                                         |
#### |                          Scale factor for QR code images. Positive integer.         |
#### |                          Must be large enough for printout scanning. 1 = no scaling.|
#### |                                                                                     |
#### |  pdfLabelApptProvider    Path to label XML using Appointment Provider as doctor.    |
#### |                          Falls back to MRP when no appointment context available.   |
#### |  pdfLabelMRP             Path to label XML always using MRP as doctor.              |
#### |                                                                                     |
#### |  print.includeMRP       true|false -- Include MRP in print reports.                 |
#### |  print.useCurrentProgramInfoInHeader                                                |
#### |                          true|false -- Use program info vs clinic info in header.   |
#### |  printPDF_referring_prac yes|no -- Include referring practitioner in printed PDFs.  |
#### |  prevention_show_comments                                                           |
#### |                          true|false -- Show prevention comments on Prevention PDF.  |
#### |                                                                                     |
#### +-------------------------------------------------------------------------------------+

WKHTMLTOPDF_COMMAND=/usr/bin/wkhtmltopdf
WKHTMLTOPDF_ARGS=--enable-local-file-access --minimum-font-size 10 --print-media-type --encoding utf-8 -T 10mm -L 8mm -R 8mm --disable-javascript
QR_CODE_ERROR_CORRECTION_LEVEL=H
QR_CODE_ENABLED_PROVIDER_DEFAULT=false
QR_CODE_IMAGE_SCALE_FACTOR=2
#pdfLabelApptProvider=/path/to/label-appt.xml
#pdfLabelMRP=/path/to/label.xml
print.includeMRP=true
print.useCurrentProgramInfoInHeader=false
printPDF_referring_prac=yes
prevention_show_comments=false



