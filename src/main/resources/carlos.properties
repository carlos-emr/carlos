#### +=====================================================================================+
#### |                                                                                     |
#### |   CARLOS EMR  --  Main Configuration Properties                                     |
#### |                                                                                     |
#### +=====================================================================================+
#### |                                                                                     |
#### |   Primary configuration file for the CARLOS EMR application. Controls database      |
#### |   connections, active modules, branding, security policies, billing, scheduling,    |
#### |   lab integrations, and all other system-wide settings.                             |
#### |                                                                                     |
#### |   Administrators should review and configure each section before deploying.         |
#### |                                                                                     |
#### |   CONVENTIONS:                                                                      |
#### |                                                                                     |
#### |     #### | ...   Documentation comment (inside section header boxes only)           |
#### |     #key=val      Disabled setting -- uncomment to enable                           |
#### |     key=val       Active setting -- value is live and read by the application       |
#### |                                                                                     |
#### |   Line continuation: use backslash (\) at end of line for multi-line values.        |
#### |   Property names use ALL_CAPS with underscores by convention.                       |
#### |                                                                                     |
#### +=====================================================================================+



#### +-------------------------------------------------------------------------------------+
#### |  1. BUILD INFORMATION                                                               |
#### +-------------------------------------------------------------------------------------+
#### |                                                                                     |
#### |  Build metadata injected by Maven during the build process. These values are        |
#### |  replaced at compile time with actual build information.                            |
#### |                                                                                     |
#### |  buildDateTime                                                                      |
#### |    The date and time when this build was created.                                   |
#### |    Populated by Maven's ${build.dateTime} token during compilation.                 |
#### |                                                                                     |
#### |  buildtag                                                                           |
#### |    A unique build identifier combining the CI job name and build number.            |
#### |    Format: JOB_NAME-BUILD_NUMBER.                                                   |
#### |                                                                                     |
#### |  buildDate                                                                          |
#### |    Legacy alias for buildDateTime. Still read by                                    |
#### |    CarlosProperties.getBuildDate() for backward compatibility.                      |
#### |                                                                                     |
#### |  buildVersion                                                                       |
#### |    Legacy alias combining job name and build number with a space separator          |
#### |    instead of a dash. Still read by CarlosProperties.getBuildTag().                 |
#### |                                                                                     |
#### +-------------------------------------------------------------------------------------+

buildDateTime=${build.dateTime}
buildtag=${build.JOB_NAME}-${build.BUILD_NUMBER}
buildDate=${build.dateTime}
buildVersion=${build.JOB_NAME} ${build.BUILD_NUMBER}



#### +-------------------------------------------------------------------------------------+
#### |  2. DATABASE & HIBERNATE                                                            |
#### +-------------------------------------------------------------------------------------+
#### |                                                                                     |
#### |  Database connection settings for MySQL/MariaDB and Hibernate ORM configuration.    |
#### |  These are critical for application startup.                                        |
#### |                                                                                     |
#### |  db_name                                                                            |
#### |    The database name with required JDBC URL parameters appended after "?".          |
#### |    The following parameters are REQUIRED and must not be removed:                   |
#### |      zeroDateTimeBehavior=round      Converts zero dates (0000-00-00) to valid      |
#### |                                      dates by rounding instead of throwing.         |
#### |      useOldAliasMetadataBehavior=true  Uses legacy column name resolution to        |
#### |                                      prevent Hibernate exceptions.                  |
#### |      jdbcCompliantTruncation=false   Suppresses exceptions for fields not           |
#### |                                      included in a query that lack defaults.        |
#### |                                                                                     |
#### |  db_username           CONFIGURE: The database username (e.g., root, carlos).       |
#### |  db_password           CONFIGURE: The database password.                            |
#### |  db_type               Database type identifier. Must be "mysql".                   |
#### |  db_driver             JDBC driver class. Uses modern MySQL Connector/J 8.x.        |
#### |                                                                                     |
#### |  db_uri                                                                             |
#### |    CONFIGURE: The JDBC connection URI prefix. Examples:                             |
#### |      jdbc:mysql://localhost:3306/   (local MySQL)                                   |
#### |      jdbc:mysql://db:3306/          (Docker container named "db")                   |
#### |      jdbc:mysql:///                 (local socket connection)                       |
#### |                                                                                     |
#### |  db_validationQuery    SQL used by the connection pool to verify connections.       |
#### |  db_max_active         Max active connections in DBCP2 pool.                        |
#### |  db_max_idle           Max idle connections retained in pool.                       |
#### |  db_max_wait           Max wait (ms) for a pool connection. 20000 = 20 seconds.     |
#### |                                                                                     |
#### |  db_log_abandoned                                                                   |
#### |    true|false -- Log stack traces for connections opened but never closed.          |
#### |    Useful for debugging connection leaks during development.                        |
#### |                                                                                     |
#### |  db_remove_abandoned                                                                |
#### |    true|false -- Automatically reclaim connections checked out longer than          |
#### |    db_remove_abandoned_timeout seconds.                                             |
#### |                                                                                     |
#### |  db_remove_abandoned_timeout                                                        |
#### |    Seconds before a connection is considered abandoned.                             |
#### |                                                                                     |
#### |  hibernate.dialect                                                                  |
#### |    The custom CARLOS MySQL dialect that extends Hibernate MySQL5Dialect with        |
#### |    EMR-specific type mappings and SQL function registrations.                       |
#### |    A commented-out line shows the standard dialect for reference.                   |
#### |                                                                                     |
#### |  hibernate.generate_statistics                                                      |
#### |    true|false -- Hibernate internal performance statistics gathering.               |
#### |    Leave false unless actively profiling.                                           |
#### |                                                                                     |
#### |  hibernate.show_sql                                                                 |
#### |    true|false -- Log all SQL statements. Very verbose. false in production.         |
#### |                                                                                     |
#### +-------------------------------------------------------------------------------------+

db_name=oscar?zeroDateTimeBehavior=round&useOldAliasMetadataBehavior=true&jdbcCompliantTruncation=false
db_username=
db_password=
db_type=mysql
db_driver=com.mysql.cj.jdbc.Driver
db_uri=jdbc:mysql:///
db_validationQuery=select 1
db_max_active=32
db_max_idle=8
db_max_wait=20000
db_log_abandoned=true
db_remove_abandoned=true
db_remove_abandoned_timeout=15
#hibernate.dialect=org.hibernate.dialect.MySQLDialect
hibernate.dialect=io.github.carlos_emr.carlos.util.persistence.OscarMySQL5Dialect
hibernate.generate_statistics=false
hibernate.show_sql=false



#### +-------------------------------------------------------------------------------------+
#### |  3. ACTIVE MODULES & FEATURE TOGGLES                                                |
#### +-------------------------------------------------------------------------------------+
#### |                                                                                     |
#### |  Global switches for activating or deactivating major EMR modules and features.     |
#### |                                                                                     |
#### |  ModuleNames                                                                        |
#### |    Comma-separated list of modules to activate. Available modules:                  |
#### |      Caisi  - CAISI community integration mode                                      |
#### |      HRM    - Hospital Report Manager                                               |
#### |      OLIS   - Ontario Lab Information System                                        |
#### |      Indivo - Personal health record integration                                    |
#### |      E2E    - E2E export (see E2E_DIFF_DAYS, E2E_DIFF settings)                     |
#### |      REST   - RESTful web services (required for the new UI)                        |
#### |      ORN    - Ontario Renal Network                                                 |
#### |      Fax    - Fax module for sending/receiving faxes                                |
#### |    Example: ModuleNames=REST,Caisi,OLIS,Fax                                         |
#### |                                                                                     |
#### |  RX_ALLERGY_CHECKING             yes|no -- Drug allergy cross-checking.             |
#### |  RX_INTERACTION_LOCAL_DRUGREF_REGIONAL_IDENTIFIER                                   |
#### |                                  yes|no -- Drug interaction checking via DrugRef.   |
#### |  RX3                             yes|no -- Version 3 prescription interface.        |
#### |  USE_NEW_ECHART                  yes|no -- New-style electronic chart module.       |
#### |                                                                                     |
#### |  plugins                         on|off -- Master switch for plugin loading.        |
#### |                                  Required for CAISI and other plugin modules.       |
#### |  caisi                           on|off -- CAISI application context.               |
#### |                                  Requires plugins=on.                               |
#### |                                                                                     |
#### |  multisites                      on|off -- Multi-site clinic support. Use           |
#### |                                  Admin > Misc > Satellite Sites Admin to manage.    |
#### |  multioffice.formalize.provider.id                                                  |
#### |                                  true|false -- Validate provider ID ranges when     |
#### |                                  multi-sites is enabled.                            |
#### |  multioffice.formalize.doctor.minimum.provider.id                                   |
#### |                                  Minimum valid provider ID for doctors (multi-site).|
#### |  multioffice.formalize.doctor.maximum.provider.id                                   |
#### |                                  Maximum valid provider ID for doctors (multi-site).|
#### |                                                                                     |
#### |  FIRST_NATIONS_MODULE            true|false -- First Nations health care fields.    |
#### |                                  Overrides the "Extra Demo Fields" method and       |
#### |                                  enables FNHA support and statistical tracking.     |
#### |  showRxBandNumber                true|false -- Show band number on prescriptions.   |
#### |  showBandNumberOnly              true|false -- Hide extra FN fields, show only      |
#### |                                  the band number on demographic details.            |
#### |                                                                                     |
#### |  PREVENTION                      yes|no -- Prevention/immunization tracking.        |
#### |  IMMUNIZATION_IN_PREVENTION      yes|no -- Include immunizations in prevention.     |
#### |  rx.enable_internal_dispensing    true|false -- Internal drug dispensing feature.   |
#### |                                                                                     |
#### +-------------------------------------------------------------------------------------+

ModuleNames=Fax
RX_ALLERGY_CHECKING=no
RX_INTERACTION_LOCAL_DRUGREF_REGIONAL_IDENTIFIER=no
RX3=yes
USE_NEW_ECHART=yes
#plugins=on
#caisi=on
multisites=off
multioffice.formalize.provider.id=false
multioffice.formalize.doctor.minimum.provider.id=1
multioffice.formalize.doctor.maximum.provider.id=100
FIRST_NATIONS_MODULE=false
showRxBandNumber=false
showBandNumberOnly=false
PREVENTION=yes
IMMUNIZATION_IN_PREVENTION=yes
rx.enable_internal_dispensing=false



#### +-------------------------------------------------------------------------------------+
#### |  4. BRANDING, UI & DISPLAY                                                          |
#### +-------------------------------------------------------------------------------------+
#### |                                                                                     |
#### |  Visual presentation, branding text, navigation links, date/time formatting,        |
#### |  and UI-level debug features.                                                       |
#### |                                                                                     |
#### |  FORMS_PROMOTEXT                                                                    |
#### |    Branding text displayed at the foot of prescriptions and printed forms.          |
#### |                                                                                     |
#### |  RX_FOOTER                                                                          |
#### |    Text displayed at the foot of the demographic view / Rx printouts.               |
#### |                                                                                     |
#### |  Vendor_Product        Vendor/product name for CDS (Clinical Document Standard)     |
#### |                        exports and data exchange.                                   |
#### |  Support_Contact       Support identifier in exported data and system info.         |
#### |  ontariomd_cds_diabeteslink                                                         |
#### |                        URL to OntarioMD CDS XSD schema for diabetes exports.        |
#### |                                                                                     |
#### |  ECHART_SIGN_LINE                                                                   |
#### |    Template for the signature line appended to encounter notes when signed.         |
#### |    Tokens: ${DATE}, ${USERSIGNATURE}, ${ROLENAME}. Resource bundle keys             |
#### |    (e.g., oscarEncounter.class...) are resolved from locale messages.               |
#### |    Example output: [Signed on 16-Aug-2010 14:11 by doctor emrdoc]                   |
#### |                                                                                     |
#### |  ECHART_VERSIGN_LINE                                                                |
#### |    Template for the verification signature line. Same tokens.                       |
#### |                                                                                     |
#### |  HELP_SEARCH_URL       URL for context-sensitive help. %s = search term.            |
#### |  DATE_FORMAT           Global date format (Java SimpleDateFormat). e.g. yyyy-MM-dd. |
#### |  TIME_FORMAT           Global time format. e.g. HH:mm:ss.                           |
#### |  resource_base_url     URL for "Resource" link in top toolbar.                      |
#### |  show_aua              true|false -- Show Acceptable Use Agreement on login page.   |
#### |  hide_ConReport_link   true|false -- Hide ConReport from top navigation.            |
#### |  hide_eConsult_link    true|false -- Hide eConsult from top navigation.             |
#### |  SHOW_INDICATOR_DASHBOARD_NUMBERS                                                   |
#### |                        true|false -- Raw numbers vs percentages on dashboard.       |
#### |  ENABLE_SECURITY_OBJECT_DEBUG                                                       |
#### |                        true|false -- Display security object names in UI.           |
#### |                        Development/debugging only. false in production.             |
#### |                                                                                     |
#### +-------------------------------------------------------------------------------------+

FORMS_PROMOTEXT=CARLOS EMR - Open-source EMR solutions - github.com/carlos-emr/carlos
#RX_FOOTER=
Vendor_Product=CARLOS
Support_Contact=CARLOS
ontariomd_cds_diabeteslink=https://www.ontariomd.ca/cms/xml/ontariomd_cds_diabetes.xsd
ECHART_SIGN_LINE=[${oscarEncounter.class.EctSaveEncounterAction.msgSigned} ${DATE} ${oscarEncounter.class.EctSaveEncounterAction.msgSigBy} ${USERSIGNATURE}]\n
ECHART_VERSIGN_LINE=[${oscarEncounter.class.EctSaveEncounterAction.msgVerAndSig} ${DATE} ${oscarEncounter.class.EctSaveEncounterAction.msgSigBy} ${USERSIGNATURE}]\n
HELP_SEARCH_URL=https://github.com/carlos-emr/carlos
DATE_FORMAT=yyyy-MM-dd
TIME_FORMAT=HH:mm:ss
resource_base_url=https://github.com/carlos-emr/carlos
show_aua=true
hide_ConReport_link=true
hide_eConsult_link=true
SHOW_INDICATOR_DASHBOARD_NUMBERS=true
ENABLE_SECURITY_OBJECT_DEBUG=false



#### +-------------------------------------------------------------------------------------+
#### |  5. CONFIDENTIALITY STATEMENTS                                                      |
#### +-------------------------------------------------------------------------------------+
#### |                                                                                     |
#### |  Confidentiality statements are added to all printed materials (PDFs, page          |
#### |  printouts, fax cover sheets, etc). Multiple versions can be defined; the           |
#### |  statement with the highest version number is automatically selected.               |
#### |                                                                                     |
#### |  confidentiality_statement.v1   Full confidentiality notice about PHI handling.     |
#### |  confidentiality_statement.v2   Short confidentiality label.                        |
#### |  confidentiality_statement.v3   Leave blank to fall back to v2. Set a value         |
#### |                                 here to override all previous versions.             |
#### |                                                                                     |
#### +-------------------------------------------------------------------------------------+

confidentiality_statement.v1=This document may contain personal health information.  Please consider confidentiality when distributing or disposing of this document.
confidentiality_statement.v2=Personal Health Information: CONFIDENTIAL
confidentiality_statement.v3=



#### +-------------------------------------------------------------------------------------+
#### |  6. SECURITY & AUTHENTICATION                                                       |
#### +-------------------------------------------------------------------------------------+
#### |                                                                                     |
#### |  User authentication, password policies, login behavior, and multi-factor           |
#### |  authentication settings.                                                           |
#### |                                                                                     |
#### |  cr_security              on|off -- Cookie-revolver security framework.             |
#### |  login_local_ip           IP address prefix for local network identification.       |
#### |  login_max_failed_times   Max consecutive failed logins before account lockout.     |
#### |  login_max_duration       Lockout duration in minutes.                              |
#### |                                                                                     |
#### |  password_min_length      Minimum required password length.                         |
#### |  password_min_groups      Min distinct character groups required (1-4).             |
#### |                           Groups: lowercase, uppercase, digits, special.            |
#### |                           Value of 3 = must use at least 3 of 4 groups.             |
#### |  password_pin_min_length  Min PIN length (CAISI and PIN-based auth).                |
#### |  password_group_lower_chars   Characters constituting the "lowercase" group.        |
#### |  password_group_upper_chars   Characters constituting the "uppercase" group.        |
#### |  password_group_digits        Characters constituting the "digits" group.           |
#### |  password_group_special       Characters constituting the "special" group.          |
#### |                               Escaped for Java properties file compatibility.       |
#### |                                                                                     |
#### |  SUPERUSER                Username of the super-admin with unrestricted access.     |
#### |  IGNORE_PASSWORD_REQUIREMENTS                                                       |
#### |                           true|false -- Disable all password checks. Dev only.      |
#### |  mandatory_password_reset true|false -- Force password change on first login.       |
#### |  password.pastPasswordsToNotUse                                                     |
#### |                           Number of previous passwords that cannot be reused.       |
#### |                           0 = allow reuse of any previous password.                 |
#### |                                                                                     |
#### |  mfa.enabled             true|false -- Require TOTP-based multi-factor auth.        |
#### |  mfa.registration.qrcode.provider.name                                              |
#### |                           Issuer name displayed in authenticator apps when          |
#### |                           scanning the MFA QR code.                                 |
#### |  mfa.registration.qrcode.logo.path                                                  |
#### |                           Logo image path embedded in MFA QR codes.                 |
#### |                           Relative to web application root.                         |
#### |  mfa.legacy.pin.enable   true|false -- Allow legacy PIN auth alongside TOTP.        |
#### |                                                                                     |
#### +-------------------------------------------------------------------------------------+

cr_security=off
login_local_ip=192.168
login_max_failed_times=10
login_max_duration=10
password_min_length=8
password_min_groups=3
password_pin_min_length=4
password_group_lower_chars=abcdefghijklmnopqrstuvwxyz
password_group_upper_chars=ABCDEFGHIJKLMNOPQRSTUVWXYZ
password_group_digits=0123456789
password_group_special=\! @\#$%^&*()_+|~-\=\\`{}[]\:";'<>?,./
SUPERUSER=emrdoc
IGNORE_PASSWORD_REQUIREMENTS=false
mandatory_password_reset=true
password.pastPasswordsToNotUse=0
mfa.enabled=true
mfa.registration.qrcode.provider.name=CARLOS EMR
mfa.registration.qrcode.logo.path=loginResource/openosp_logo.png
mfa.legacy.pin.enable=true



#### +-------------------------------------------------------------------------------------+
#### |  7. PATIENT DEMOGRAPHICS & CONTACTS                                                 |
#### +-------------------------------------------------------------------------------------+
#### |                                                                                     |
#### |  Patient search, label printing, demographic fields, consent modules,               |
#### |  contact management, rostering, and other patient-record features.                  |
#### |                                                                                     |
#### |  default_search_mode    Default patient search criteria. Options:                   |
#### |                         search_name, search_phone, search_dob,                      |
#### |                         search_address, search_hin, search_chart_no.                |
#### |                                                                                     |
#### |  label.1no - label.5no  Number of labels to print for each position (1-5).          |
#### |  label.left             Left margin offset (printer units) for label printing.      |
#### |  label.top              Top margin offset (printer units) for label printing.       |
#### |  label.height           Height of each label (printer units).                       |
#### |  label.gap              Gap between labels (printer units).                         |
#### |                                                                                     |
#### |  workflow_enhance        true|false -- Enhanced patient workflow features.          |
#### |  new_label_print         true|false -- New label printing mode.                     |
#### |  phoneprefix             Default area code for new patient phones. Blank = none.    |
#### |                                                                                     |
#### |  inactive_statuses       Comma-separated inactive patient status codes:             |
#### |                          IN=Inactive, DE=Deceased, IC=Inactive Chart,               |
#### |                          ID=Inactive Deceased, MO=Moved, FI=Fired.                  |
#### |                                                                                     |
#### |  --- Consent Module ---                                                             |
#### |                                                                                     |
#### |  privateConsentEnabled   true|false -- Master switch for informed consent.          |
#### |  privateConsentPrograms  Comma-separated program IDs for consent dialogs.           |
#### |  STUDENT_PARTICIPATION_CONSENT  true|false -- Student participation consent.        |
#### |  PRIVACY_CONSENT                true|false -- Privacy consent dialog.               |
#### |  INFORMED_CONSENT               true|false -- Informed consent dialog.              |
#### |  US_CONSENT                     true|false -- US-style consent dialog.              |
#### |  USE_NEW_PATIENT_CONSENT_MODULE                                                     |
#### |                          true|false -- New versatile consent management interface.  |
#### |                                                                                     |
#### |  --- Demographic Extensions ---                                                     |
#### |                                                                                     |
#### |  EXTRA_DEMO_FIELDS      Pipe-separated list of extra JSP pages for demographic      |
#### |                         view. Example: vnativefields                                |
#### |  demographicExt         Pipe-separated custom demographic extension field labels.   |
#### |  demographicExtForm     Pipe-separated HTML form elements for each extension.       |
#### |  demographicExtJScript  Optional JavaScript for extension field validation.         |
#### |                                                                                     |
#### |  --- Demographic Features ---                                                       |
#### |                                                                                     |
#### |  DEMOGRAPHIC_PROGRAM_ADMISSIONS                                                     |
#### |                          true|false -- Program admissions fields (CAISI).           |
#### |  DEMOGRAPHIC_PATIENT_CLINIC_STATUS                                                  |
#### |                          true|false -- Patient contacts and clinic status list.     |
#### |  ENABLE_EMERGENCY_PRIVATE_CONTACT_FIELD                                             |
#### |                          true|false -- Emergency contact on Add/Edit demographic.   |
#### |                          WARNING: Do not enable with NEW_CONTACTS_UI.               |
#### |  DEMOGRAPHIC_PATIENT_ROSTERING                                                      |
#### |                          true|false -- Patient rostering management (Ontario FHT).  |
#### |  DEMOGRAPHIC_PATIENT_HEALTH_CARE_TEAM                                               |
#### |                          true|false -- Health Care Team management interface.       |
#### |                          WARNING: conflicts with NEW_CONTACTS_UI and                |
#### |                          NEW_CONTACTS_UI_EXTERNAL_CONTACT.                          |
#### |  NEW_CONTACTS_UI_EXTERNAL_CONTACT                                                   |
#### |                          true|false -- External contact UI. Cannot run              |
#### |                          simultaneously with HEALTH_CARE_TEAM.                      |
#### |  NEW_CONTACTS_UI        true|false -- Patient Contacts module replacing "add        |
#### |                         relationship". Cannot run with HEALTH_CARE_TEAM.            |
#### |  DEMOGRAPHIC_WAITING_LIST                                                           |
#### |                          true|false -- Waiting list on edit demographic page.       |
#### |  ENABLE_CHART_JOINING   true|false -- Cross-reference patient charts (e.g., family).|
#### |  ENABLE_PATIENT_NEWSLETTER                                                          |
#### |                          true|false -- Patient newsletter for bulk communications.  |
#### |                                                                                     |
#### |  hctype                 Default Health Card Type for new demographics:              |
#### |                         ON, BC, QC, AB, etc. Falls back to billregion if unset.     |
#### |                         Users can also set personal default via Preferences.        |
#### |  caisi.registration_intake.updateMRPOnSave                                          |
#### |                          true|false -- Set MRP when saving CAISI intake form.       |
#### |  enable_create_child_record                                                         |
#### |                          true|false -- Quick interface for adding a newborn         |
#### |                          record linked to the mother's chart.                       |
#### |  RX_INTERACTION_WARNING  true|false -- Show drug interaction warning messages.      |
#### |  SHOW_FILE_IMPORT_SEARCH true|false -- Import demographics from search results.     |
#### |  PublicHealthIDsEnabled  true|false -- Public Health ID management interface.       |
#### |  ENABLE_QUICK_DEMOGRAPHIC_PAGE                                                      |
#### |                          true|false -- Short-form "Add New Demographic" link        |
#### |                          under search results.                                      |
#### |  PAPER_CHART_INDICATOR  true|false -- Show scanned-from-paper indicator.            |
#### |  demographic.export.encryptedOnly                                                   |
#### |                          true|false -- Force all demographic exports to be          |
#### |                          encrypted. Prevents unencrypted PHI export.                |
#### |  iso3166.2.enabled      true|false -- ISO 3166-2 province/country dropdowns         |
#### |                         instead of legacy province list.                            |
#### |  default_phu            Default Public Health Unit ID (references LookupList        |
#### |                         and LookupListItem tables).                                 |
#### |  phu.hide               true|false -- Hide PHU field from demographic record.       |
#### |  skip_postal_code_validation                                                        |
#### |                          true|false -- Skip postal code validation.                 |
#### |                                                                                     |
#### +-------------------------------------------------------------------------------------+

default_search_mode=search_name
label.1no=1
label.2no=1
label.3no=1
label.4no=1
label.5no=1
label.left=200
label.top=0
label.height=145
label.gap=0
workflow_enhance=false
new_label_print=false
phoneprefix=
inactive_statuses='IN','DE','IC','ID','MO','FI'
privateConsentEnabled=false
privateConsentPrograms=10016
STUDENT_PARTICIPATION_CONSENT=false
PRIVACY_CONSENT=false
INFORMED_CONSENT=false
US_CONSENT=false
USE_NEW_PATIENT_CONSENT_MODULE=false
#EXTRA_DEMO_FIELDS=vnativefields
demographicExt=Preferred First Name|Previous Legal Names|Another Patient with Similar Name Exists|Page Staff to Review Chart Next Appt|Reason for Needing to Review Chart|Block Fee Status|Research Study Permission
