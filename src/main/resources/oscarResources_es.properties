form.homeFalls.d1=No hay cables ni otros objetos que obstruyan o invadan pasillos/puertas. Incluye muebles y otros objetos que obstruyen puertas o pasillos, objetos detr\u00e1s de las puertas, y umbrales elevados.
form.homeFalls.d2=Las alfombras/esterillas est\u00e1n planas, sin roturas ni desgaste, y no hay baldosas agrietadas o faltantes, incluyendo las escaleras.
form.homeFalls.d3=Marque 'no' si hay lin\u00f3leo o baldosas en la cocina, ba\u00f1o o lavander\u00eda; las superficies deben ser antideslizantes o resistentes al deslizamiento.
form.homeFalls.d4=Las alfombras sueltas tienen un respaldo antideslizante eficaz o est\u00e1n fijadas al piso.
form.homeFalls.d5=La cama tiene altura y firmeza adecuadas. La persona no necesita apoyarse en los muebles junto a la cama para levantarse.
form.homeFalls.d6=La silla tiene altura adecuada, los apoyabrazos permiten impulsarse y el coj\u00edn no es demasiado blando ni hondo.
form.homeFalls.d7=No hay bombillas de menos de 75W, ni sombras en las habitaciones, ni exceso de brillo.
form.homeFalls.d8=La persona no tiene que levantarse de la cama para encender la luz por la noche; tiene linterna o l\u00e1mpara de noche.
form.homeFalls.d9=Hay luces sobre las puertas traseras y delanteras, bombillas de al menos 75W y caminos iluminados, incluidos los vest\u00edbulos comunes.
form.homeFalls.d10=El inodoro tiene altura adecuada; la persona no necesita apoyarse en el lavabo/portarrollos para levantarse; hay barra al lado si hace falta.
form.homeFalls.d11=La persona puede pasar el borde de la ba\u00f1era sin riesgo y entrar/salir sin necesidad de agarrarse a muebles (o usa tabla de ba\u00f1era, o ducha sobre ba\u00f1era sin riesgo).
form.homeFalls.d12=La persona puede pasar el borde de la ducha o los rieles del cerramiento sin riesgo y sin apoyarse en nada.
form.homeFalls.d13=Las barras est\u00e1n fijadas con seguridad a la pared, no son toalleros, y se alcanzan sin inclinarse demasiado.
form.homeFalls.d14=Alfombras de goma antideslizantes en buen estado o tiras antideslizantes en la base de la ba\u00f1era o ducha.
form.homeFalls.d15=No m\u00e1s de dos puertas de distancia, incluyendo la puerta del dormitorio; no requiere salir afuera ni abrir cerraduras para llegar.
form.homeFalls.d16=Los armarios est\u00e1n a una altura entre hombros y rodillas; no se requieren sillas ni escalerillas para alcanzar objetos.
form.homeFalls.d17=Las comidas pueden transportarse con seguridad o con un carrito hasta donde la persona suele comer.
form.homeFalls.d18=La barra de apoyo debe ser f\u00e1cil de agarrar, bien fija, resistente y disponible a lo largo de toda la escalera.
form.homeFalls.d19=Los escalones son m\u00e1s de dos consecutivos; la barra debe ser f\u00e1cil de agarrar, bien fija, resistente y disponible a lo largo de toda la escalera.
form.homeFalls.d20=Los escalones no son demasiado altos, estrechos o irregulares; la persona no debe fatigarse ni quedarse sin aire al usarlos y no debe haber factores m\u00e9dicos que afecten la seguridad.
form.homeFalls.d21=No hay patrones, baldosas o pintura que oculten el borde del escal\u00f3n.
form.homeFalls.d22=Las cerraduras y pestillos se usan sin agacharse ni estirarse demasiado; hay un descansillo para abrir la puerta con seguridad.
form.homeFalls.d23=No hay caminos agrietados o sueltos, maleza, \u00e1rboles colgantes ni mangueras que invadan los caminos.
form.homeFalls.d24=La persona lleva zapatos o pantuflas de buen ajuste, con tac\u00f3n bajo y suela antideslizante.
form.homeFalls.d25=Mascotas = cualquier animal del que la persona sea responsable. La persona no debe agacharse ni alimentar/limpiar mascotas que saltan o est\u00e1n bajo los pies, y no requieren mucho ejercicio.
form.homeFalls.naShowerRecess=(no hay ducha independiente en el hogar)
