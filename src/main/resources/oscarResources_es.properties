report.PopulationReport.caption.notes=Notas sobre los datos
report.PopulationReport.note1=1) Lista de todos los refugios en el sistema CAISI: John Howard Society (agencia de servicios), Salvation Army Gateway (refugio), Salvation Army Maxwell Meighen (refugio), Seaton House (refugio), Sherbourne Health Center (agencia de salud), Street Health (programa de alcance comunitario).
report.PopulationReport.note2=2) El indicador de \u00ab intensidad del uso del refugio \u00bb utiliza valores producidos por New York City Health and Department of Homeless Services (2005). Como CAISI no ha estado operativo durante 4 anos, usamos los mismos valores para la duracion de la estancia pero solo dentro de la vida de CAISI (aproximadamente 15 meses) en lugar de 4 anos. Esto significa que el nivel de intensidad informado en este informe es mas alto que las estadisticas comparables de Nueva York.
report.PopulationReport.note3=3) En cada caso en que se informa una tasa de prevalencia o incidencia, el denominador representa el numero de clientes actualmente en un programa de camas en los refugios CAISI.
report.PopulationReport.note4=4) Las condiciones especificas se definen usando codigos ICD-10. El valor del numerador se define como el numero de clientes del denominador a quienes se les ha diagnosticado una condicion asociada con uno o mas de los codigos ICD-10 que siguen.
