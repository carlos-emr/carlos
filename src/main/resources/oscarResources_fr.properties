form.homeFalls.q1=Les voies de passage sont-elles libres de cordons et d'encombrements?
form.homeFalls.q2=Les rev\u00eatements de sol sont-ils en bon \u00e9tat?
form.homeFalls.q3=Les surfaces de plancher sont-elles antiglisse?
form.homeFalls.q4=Les tapis libres sont-ils solidement fix\u00e9s au plancher?
form.homeFalls.q5=La personne peut-elle entrer et sortir du lit facilement et en toute s\u00e9curit\u00e9?
form.homeFalls.q6=La personne peut-elle se lever du fauteuil de salon facilement et en toute s\u00e9curit\u00e9?
form.homeFalls.q7=Toutes les lumi\u00e8res sont-elles assez brillantes pour que la personne voie clairement?
form.homeFalls.q8=La personne peut-elle allumer facilement une lumi\u00e8re depuis son lit?
form.homeFalls.q9=Les chemins ext\u00e9rieurs, marches et entr\u00e9es sont-ils \u00e9clair\u00e9s la nuit?
form.homeFalls.q10=La personne peut-elle monter et descendre des toilettes facilement et en toute s\u00e9curit\u00e9?
form.homeFalls.q11=La personne peut-elle entrer et sortir de la baignoire facilement et en toute s\u00e9curit\u00e9?
form.homeFalls.q12=La personne peut-elle entrer et sortir du receveur de douche facilement et en toute s\u00e9curit\u00e9?
form.homeFalls.q13=Y a-t-il une barre d'appui accessible/solide dans la douche ou pr\u00e8s de la baignoire?
form.homeFalls.q14=Des tapis antiglisse sont-ils utilis\u00e9s dans la baignoire/salle de bain/receveur de douche?
form.homeFalls.q15=Les toilettes sont-elles proches de la chambre?
form.homeFalls.q16=La personne peut-elle atteindre facilement les objets de cuisine utilis\u00e9s r\u00e9guli\u00e8rement sans grimper, se pencher ou perdre l'\u00e9quilibre?
form.homeFalls.q17=La personne peut-elle transporter les repas facilement et en toute s\u00e9curit\u00e9 de la cuisine \u00e0 la salle \u00e0 manger?
form.homeFalls.q18=Les marches/escaliers int\u00e9rieurs ont-ils une barre d'appui accessible/solide sur toute leur longueur?
form.homeFalls.q19=Les marches ext\u00e9rieures ont-elles une barre d'appui accessible/solide sur toute leur longueur?
form.homeFalls.q20=La personne peut-elle monter et descendre les marches/escaliers facilement et en toute s\u00e9curit\u00e9, \u00e0 l'int\u00e9rieur ou \u00e0 l'ext\u00e9rieur de la maison?
form.homeFalls.q21=Les bords des marches/escaliers sont-ils facilement identifiables?
form.homeFalls.q22=La personne peut-elle utiliser la ou les portes d'entr\u00e9e facilement et en toute s\u00e9curit\u00e9?
form.homeFalls.q23=Les chemins autour de la maison sont-ils en bon \u00e9tat et exempts d'encombrement?
form.homeFalls.q24=La personne porte-t-elle des chaussons et des chaussures bien ajust\u00e9s?
