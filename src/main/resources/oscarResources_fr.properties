form.homeFalls.d1=Pas de cordons ni d'encombrements (bo\u00eetes, journaux, objets) sur les passages ou les portes. Comprend les meubles et autres objets qui bloquent les portes ou les couloirs, les objets derri\u00e8re les portes, et les seuils \u00e9lev\u00e9s.
form.homeFalls.d2=Les tapis/rev\u00eatements sont plats, sans d\u00e9chirure, pas us\u00e9s, sans carreaux fissur\u00e9s ou manquants, y compris dans les escaliers.
form.homeFalls.d3=R\u00e9pondez 'non' si du lino ou des carreaux se trouvent dans la cuisine, la salle de bain ou la buanderie; ces pi\u00e8ces doivent avoir des surfaces antiglisse.
form.homeFalls.d4=Les tapis libres ont un support antiglisse efficace ou sont fix\u00e9s au sol.
form.homeFalls.d5=Le lit a une hauteur et une fermet\u00e9 appropri\u00e9es. La personne n'a pas besoin de s'appuyer sur les meubles au chevet.
form.homeFalls.d6=La chaise a une hauteur appropri\u00e9e, les accoudoirs permettent de se relever et le coussin n'est pas trop mou ni trop profond.
form.homeFalls.d7=Pas d'ampoules de moins de 75 W, pas d'ombres dans les pi\u00e8ces, pas d'\u00e9blouissement excessif.
form.homeFalls.d8=La personne n'a pas \u00e0 sortir du lit pour allumer une lumi\u00e8re la nuit; elle a une lampe de poche ou une lampe de chevet.
form.homeFalls.d9=Il y a des lumi\u00e8res au-dessus des portes avant et arri\u00e8re, des ampoules d'au moins 75 W, et des passages \u00e9clair\u00e9s, y compris les halls communs.
form.homeFalls.d10=Les toilettes ont une hauteur suffisante; la personne n'a pas besoin de se tenir au lavabo/porte-rouleau pour se lever; une barre est pr\u00e8s des toilettes si besoin.
form.homeFalls.d11=La personne peut franchir le rebord de la baignoire sans risque et y entrer/s'en sortir sans avoir besoin de s'accrocher aux meubles (ou utilise une planche de baignoire, ou une douche sur baignoire sans risque).
form.homeFalls.d12=La personne peut franchir le bac de douche ou les rails sans risque et sans s'appuyer sur quoi que ce soit.
form.homeFalls.d13=Barres fix\u00e9es solidement au mur, qui ne sont pas des porte-serviettes, et qui peuvent \u00eatre atteintes sans se pencher trop.
form.homeFalls.d14=Tapis en caoutchouc antiglisse bien entretenus ou bandes antiglisse au fond de la baignoire ou du bac de douche.
form.homeFalls.d15=Pas plus de deux portes de distance, y compris la porte de la chambre; il n'est pas n\u00e9cessaire de sortir ou d'ouvrir des portes \u00e0 cl\u00e9 pour y acc\u00e9der.
form.homeFalls.d16=Les armoires sont accessibles entre la hauteur des \u00e9paules et des genoux; pas besoin de chaise ni d'escabeau.
form.homeFalls.d17=Les repas peuvent \u00eatre transport\u00e9s en s\u00e9curit\u00e9 ou sur un chariot jusqu'au lieu habituel du repas.
form.homeFalls.d18=La barre doit \u00eatre facile \u00e0 saisir, solidement fix\u00e9e, suffisamment robuste et disponible sur toute la longueur des marches.
form.homeFalls.d19=Les marches sont plus de deux cons\u00e9cutives; la barre doit \u00eatre facile \u00e0 saisir, solidement fix\u00e9e, suffisamment robuste et disponible sur toute la longueur des marches.
form.homeFalls.d20=Les marches ne sont pas trop hautes, trop \u00e9troites ou trop irr\u00e9guli\u00e8res; la personne ne doit pas se fatiguer ni manquer d'air en les utilisant et aucun facteur m\u00e9dical ne doit compromettre la s\u00e9curit\u00e9.
form.homeFalls.d21=Aucun motif, carreau ou peinture ne doit masquer le bord de la marche.
form.homeFalls.d22=Les serrures et verrous peuvent \u00eatre utilis\u00e9s sans se pencher ni trop se tendre; il y a un palier pour ouvrir la porte en s\u00e9curit\u00e9.
form.homeFalls.d23=Pas de chemins fissur\u00e9s ou instables, pas de plantes/herbes envahissantes, pas d'arbres bas ni de tuyaux d'arrosage sur les passages.
form.homeFalls.d24=La personne porte des chaussures ou pantoufles bien ajust\u00e9es, \u00e0 talon bas et semelles antiglisse.
form.homeFalls.d25=Animaux = tout animal dont la personne a la responsabilit\u00e9. La personne ne doit pas se pencher pour nourrir/nettoyer des animaux qui sautent ou sont sous les pieds; ils ne demandent pas beaucoup d'exercice.
