report.PopulationReport.caption.notes=Notes sur les donn\u00e9es
report.PopulationReport.note1=1) Liste de tous les refuges du syst\u00e8me CAISI : John Howard Society (organisme de services), Salvation Army Gateway (refuge), Salvation Army Maxwell Meighen (refuge), Seaton House (refuge), Sherbourne Health Center (organisme de soins de sant\u00e9), Street Health (programme de sensibilisation).
report.PopulationReport.note2=2) L'indicateur \u00ab intensit\u00e9 de l'utilisation des refuges \u00bb utilise les valeurs produites par le New York City Health and Department of Homeless Services (2005). Comme CAISI n'a pas \u00e9t\u00e9 op\u00e9rationnel pendant 4 ans, nous utilisons les m\u00eames valeurs pour la dur\u00e9e de s\u00e9jour, mais seulement dans la dur\u00e9e de vie de CAISI (environ 15 mois) plut\u00f4t que 4 ans. Cela signifie que le niveau d'intensit\u00e9 signal\u00e9 dans ce rapport est plus \u00e9lev\u00e9 que les statistiques new-yorkaises comparables.
report.PopulationReport.note3=3) Dans chaque cas o\u00f9 un taux de pr\u00e9valence ou d'incidence est signal\u00e9, le d\u00e9nominateur repr\u00e9sente le nombre de clients actuellement dans un programme de lits dans les refuges CAISI.
report.PopulationReport.note4=4) Les affections sp\u00e9cifiques sont d\u00e9finies \u00e0 l'aide des codes ICD-10. La valeur du num\u00e9rateur est d\u00e9finie comme le nombre de clients du d\u00e9nominateur qui ont re\u00e7u un diagnostic d'une affection associ\u00e9e \u00e0 un ou plusieurs des codes ICD-10 qui suivent.
