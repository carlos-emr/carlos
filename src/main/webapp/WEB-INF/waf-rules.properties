# ===========================================================================
# CARLOS EMR — WAF Rules Configuration
# ===========================================================================
#
# This file documents the WAF rule set alignment with security standards.
# Actual WAF component configuration is controlled via carlos.properties.
#
# Standards covered:
#
#   NIST SP 800-53 (Security and Privacy Controls):
#     SC-5   Denial-of-Service Protection      — rate limiting (RateLimitFilter, carlos.properties)
#     SC-7   Boundary Protection               — GeoIP filtering (GeoIpFilter — planned, not yet implemented)
#     SC-8   Transmission Confidentiality      — HTTPS enforcement via Tomcat connector
#     SC-28  Protection of Information at Rest — encryption at rest (application layer)
#     SI-3   Malicious Code Protection         — request inspection (WafFilter — planned, not yet implemented)
#     SI-4   System Monitoring                 — detect mode (all WAF filters)
#     SI-10  Information Input Validation      — input sanitisation (WafFilter — planned, not yet implemented)
#
#   OWASP Top 10 (2021):
#     A01 — Broken Access Control              — SecurityInfoManager privilege checks
#     A03 — Injection                          — parameterized queries, WafFilter SQLi rules (WafFilter — planned)
#     A07 — Identification and Authentication  — RateLimitFilter brute force protection
#
#   OWASP CRS (Core Rule Set):
#     912xxx — DoS Protection rules            — RateLimitFilter (WAF_RATE_LIMIT_*)
#     941xxx — XSS rules                       — WafFilter (planned — not yet implemented)
#     942xxx — SQLi rules                      — WafFilter (planned — not yet implemented)
#
#   OWASP ASVS 4.0:
#     §11.1.4 — Rate limiting on auth endpoints — RateLimitFilter path tiers
#
# ===========================================================================
# Filter Activation Summary
# ===========================================================================
#
# Component               Property Key            Default  Scope      Status
# ----------------------  ----------------------  -------  ---------  ------
# RateLimitFilter         WAF_RATE_LIMIT_ENABLED  false    /*         Implemented
# GeoIpFilter             WAF_GEOIP_ENABLED       n/a      /*         Planned — not yet implemented
# WafFilter               WAF_ENABLED             n/a      /*         Planned — not yet implemented
#
# Note: GeoIpFilter and WafFilter are documented here for standards alignment
# purposes only. They are not yet implemented. Enable only RateLimitFilter via
# WAF_RATE_LIMIT_ENABLED in carlos.properties.
#
# ===========================================================================
