# =============================================================================
# WAF Rules Reference — NIST/OWASP Mapping Documentation
# =============================================================================
#
# This file is a STANDARDS-REFERENCE ONLY.
# All WAF configuration has been moved to carlos.properties (WAF_* keys).
# No properties in this file affect runtime behaviour.
#
# =============================================================================
# OWASP ModSecurity Core Rule Set (CRS) Mapping
# =============================================================================
#
# The WafFilter detection modules map to the following OWASP CRS rule groups:
#
# +----------------------------+------------+----------------------------------+
# | WafFilter Module           | OWASP CRS  | Description                      |
# +----------------------------+------------+----------------------------------+
# | SQL Injection              | 942xxx     | SQL injection prevention rules   |
# | Cross-Site Scripting (XSS) | 941xxx     | XSS prevention rules             |
# | Path Traversal             | 930xxx     | Path traversal / LFI rules       |
# | Command Injection          | 932xxx     | OS/RCE command injection rules   |
# | Header Injection (CRLF)    | 921xxx     | HTTP protocol violation rules    |
# | Scanner Detection          | 913xxx     | Known attack tool signatures     |
# | Request Limits             | 920xxx     | Request size/complexity limits   |
# | Protocol Enforcement       | 911xxx     | Blocked HTTP method rules        |
# +----------------------------+------------+----------------------------------+
#
# Reference: https://owasp.org/www-project-modsecurity-core-rule-set/
#
# =============================================================================
# NIST SP 800-53 / SP 800-94 Mapping
# =============================================================================
#
# NIST SP 800-53 Rev 5 controls satisfied by the WafFilter:
#
# SI-3  — Malicious Code Protection
#   Scanning inbound requests for attack signatures is analogous to malicious
#   code detection for web-layer input vectors.
#
# SI-10 — Information Input Validation
#   The WAF performs application-layer input validation as a defence-in-depth
#   measure, complementing parameterised queries and OWASP encoding in the
#   application code.
#
# SI-15 — Information Output Filtering
#   CRLF detection (header injection) protects response integrity by blocking
#   attacks that attempt to inject HTTP response headers.
#
# SC-5  — Denial-of-Service Protection
#   Request size and parameter count limits (920xxx rules) mitigate
#   resource-exhaustion attacks against the web tier.
#
# AC-17 — Remote Access
#   Scanner / automated-tool detection (913xxx) reduces the reconnaissance
#   attack surface for remote adversaries.
#
# Reference: https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final
#            https://csrc.nist.gov/publications/detail/sp/800-94/final
#
# =============================================================================
# Healthcare-Specific Considerations
# =============================================================================
#
# RELAXED PATHS — Clinical content endpoints
# ------------------------------------------
# The following endpoint patterns are on the WAF "relaxed" list. Injection
# pattern checks are skipped for POST body parameters on these paths because
# medical free-text (clinical notes, assessments, prescriptions) legitimately
# contains constructs that trigger generic SQLi/XSS rules, e.g.:
#
#   • "SELECT-ive serotonin reuptake inhibitor (SSRI)" — triggers UNION SELECT
#     pattern without relaxation
#   • "<patient name> OR family history of diabetes" — triggers OR-tautology
#     pattern without relaxation
#   • Expression() references in medication dosing instructions
#
# Relaxed paths (POST body params exempt from injection checks):
#   /CaseManagementEntry.do
#   /SaveNote.do
#   /oscarEncounter/
#   /eform/
#   /annotation/
#
# URI and query-string values are still fully inspected on relaxed paths.
#
# HARDENED PATHS — High-security endpoints
# -----------------------------------------
# The following endpoint patterns use tighter request limits:
#   WAF_MAX_PARAM_COUNT_HARDENED    (default: 10)
#   WAF_MAX_PARAM_VALUE_LENGTH_HARDENED (default: 1024)
#
# Hardened paths:
#   /login.do
#   /mfa/
#   /lab/CMLlabUpload.do
#   /admin/MergeRecords.do
#
# ALLOWLIST PATHS — Static assets
# --------------------------------
# The following paths bypass ALL WAF checks (static, non-executable assets):
#   /images/, /css/, /js/, /fonts/, /favicon.ico, /csrfguard
#
# =============================================================================
# SQL Injection Signature Reference (OWASP CRS 942xxx)
# =============================================================================
#
# Pattern 942100 — UNION-based injection
#   Regex: (?i)\bunion\b[\s\S]{0,30}\bselect\b
#   Attack: id=1 UNION SELECT username,password FROM users--
#
# Pattern 942130 — Boolean tautology
#   Regex: (?i)\b(or|and)\b\s*['"]?\d+['"]?\s*=\s*['"]?\d+['"]?
#   Attack: ' OR '1'='1, 1 OR 1=1, ' AND 1=1--
#
# Pattern 942150 — Stacked queries
#   Regex: (?i);\s*(drop|truncate|delete\s+from|insert\s+into|update\s+\w)\b
#   Attack: 1; DROP TABLE users--, 1; DELETE FROM logs--
#
# Pattern 942160 — Time-based blind injection
#   Regex: (?i)\b(sleep|waitfor\s+delay|benchmark)\s*\(
#   Attack: 1 AND SLEEP(5), 1; WAITFOR DELAY '0:0:5'--
#
# Pattern 942180 — INTO OUTFILE / DUMPFILE
#   Regex: (?i)\binto\s+(outfile|dumpfile)\b
#   Attack: UNION SELECT '<?php...' INTO OUTFILE '/var/www/shell.php'
#
# Pattern 942200 — LOAD_FILE()
#   Regex: (?i)\bload_file\s*\(
#   Attack: UNION SELECT LOAD_FILE('/etc/passwd')--
#
# Pattern 942280 — information_schema enumeration
#   Regex: (?i)\binformation_schema\b
#   Attack: UNION SELECT table_name FROM information_schema.tables--
#
# Pattern 942290 — Comment-based termination
#   Regex: (?i)'\s*(--|/*)
#   Attack: admin'-- , ' OR 1=1/*
#
# =============================================================================
# XSS Signature Reference (OWASP CRS 941xxx)
# =============================================================================
#
# Pattern 941100 — <script> tag injection
# Pattern 941120 — Event handler attributes (onerror, onload, onclick, etc.)
# Pattern 941130 — javascript: URI scheme
# Pattern 941140 — vbscript: URI scheme
# Pattern 941160 — data:text/html URI
# Pattern 941170 — <iframe>, <object>, <embed>, <svg>, <math> tags
# Pattern 941180 — CSS expression() injection
# Pattern 941390 — eval() function injection
# Pattern 941200 — HTML entity encoding (&#xxx;) obfuscation
#
# =============================================================================
# Path Traversal Signature Reference (OWASP CRS 930xxx)
# =============================================================================
#
# Pattern 930100 — Directory traversal: ../ or ..\
# Pattern 930110 — URL-encoded traversal: %2e%2e
# Pattern 930120 — Double URL-encoded traversal: %252e%252e
# Pattern 930130 — Sensitive file access: /etc/passwd, /etc/shadow, etc.
# Pattern 930140 — Linux /proc filesystem access
# Pattern 930150 — Windows \windows\system32 access
# Pattern 930160 — Overlong UTF-8 encoding: %c0%af
# Pattern 930170 — file:// protocol
#
# =============================================================================
# Command Injection Signature Reference (OWASP CRS 932xxx)
# =============================================================================
#
# Pattern 932100 — Shell metacharacter + command: ; id, | whoami, ; bash
# Pattern 932105 — Command substitution subshell: $(command)
# Pattern 932130 — JNDI / Log4Shell: ${jndi:ldap://...}
# Pattern 932140 — Backtick command execution: `command`
#
# =============================================================================
# CRLF Header Injection Reference (OWASP CRS 921xxx)
# =============================================================================
#
# Pattern 921110 — HTTP request splitting (CRLF in parameter): %0d, %0a
# Pattern 921130 — Literal CR/LF in parameter value
#
# =============================================================================
# Scanner Detection Reference (OWASP CRS 913xxx)
# =============================================================================
#
# Pattern 913100 — Known automated scanner User-Agent strings:
#   sqlmap, nikto, nmap, masscan, zgrab, nuclei, dirbuster, gobuster, wfuzz,
#   hydra, burpsuite, zaproxy, w3af, arachni, skipfish, vega, grabber, fimap,
#   commix (19 signatures)
#
# =============================================================================
# Request Size Limits Reference (OWASP CRS 920xxx)
# =============================================================================
#
# Rule 920100 — URI length limit: WAF_MAX_URI_LENGTH (default 2048 bytes)
# Rule 920170 — Parameter count limit: WAF_MAX_PARAM_COUNT (100) /
#               WAF_MAX_PARAM_COUNT_HARDENED (10 on hardened paths)
# Rule 920200 — Parameter value length: WAF_MAX_PARAM_VALUE_LENGTH (65536) /
#               WAF_MAX_PARAM_VALUE_LENGTH_HARDENED (1024 on hardened paths)
#
# =============================================================================
# Protocol Enforcement Reference (OWASP CRS 911xxx)
# =============================================================================
#
# Rule 911100 — Blocked HTTP methods: TRACE, TRACK
#
