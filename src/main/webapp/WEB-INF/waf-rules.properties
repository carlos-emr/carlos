# =============================================================================
# CARLOS EMR — Web Application Firewall (WAF) Configuration
# =============================================================================
#
# This file configures the WafFilter servlet filter. Changes take effect on
# application restart (the filter reads this file once during init()).
#
# IMPORTANT: Start with waf.mode=detect in production to observe what would be
# blocked without actually blocking anything. Review the WAF logs (category
# "waf.filter") for false positives before switching to enforce mode.
#
# =============================================================================
# Standards & Compliance References
# =============================================================================
#
# This WAF configuration is aligned with the following standards:
#
# NIST SP 800-53 Rev. 5 — Security and Privacy Controls
#   SC-7   Boundary Protection              — WAF acts as application-layer boundary
#   SI-3   Malicious Code Protection         — injection pattern detection
#   SI-4   System Monitoring                 — detect mode logging, violation tracking
#   SI-10  Information Input Validation      — parameter limits, encoding checks
#   AC-4   Information Flow Enforcement      — GeoIP, IP reputation (GeoIpFilter)
#   AU-3   Content of Audit Records          — violation logs include IP, URI, rule
#   AU-6   Audit Record Review               — detect mode enables log-based tuning
#   SC-5   Denial-of-Service Protection      — rate limiting (Tomcat RateLimitFilter)
#   CM-7   Least Functionality               — TRACE/TRACK method blocking
#
# NIST SP 800-44 Rev. 2 — Guidelines on Securing Public Web Servers
#   Section 8.2  Web Application Firewalls   — input validation, request filtering
#   Section 8.3  Intrusion Detection         — detect mode, scanner signatures
#
# OWASP Core Rule Set (CRS) v4.x — Rule Group Mapping
#   911xxx  Method Enforcement               → waf.module.protocol-enforcement
#   913xxx  Scanner Detection                → waf.module.scanner-detection
#   920xxx  Protocol Enforcement             → waf.module.request-limits
#   921xxx  HTTP Response Splitting          → waf.module.header-injection
#   930xxx  Local File Inclusion             → waf.module.path-traversal
#   932xxx  Remote Code Execution            → waf.module.command-injection
#   941xxx  Cross-Site Scripting             → waf.module.xss
#   942xxx  SQL Injection                    → waf.module.sqli
#
# OWASP CRS Paranoia Levels (our default configuration = PL1)
#   PL1: Low false positives, catches common attacks (DEFAULT — recommended start)
#   PL2: Additional patterns, moderate false positive risk
#   PL3: Aggressive detection, requires tuning and relaxed paths
#   PL4: Maximum detection, very high false positives (not recommended for healthcare)
#
# OWASP Top 10 (2021) — Coverage
#   A01 Broken Access Control               — TRACE/TRACK blocking, path traversal
#   A02 Cryptographic Failures              — (handled at application layer, not WAF)
#   A03 Injection                           — SQLi, XSS, command injection, CRLF
#   A04 Insecure Design                     — request limits, parameter validation
#   A05 Security Misconfiguration           — scanner detection, method enforcement
#   A06 Vulnerable Components               — (handled by dependency management)
#   A07 Auth Failures                       — rate limiting on login (RateLimitFilter)
#   A08 Software/Data Integrity Failures    — (handled at application layer)
#   A09 Logging & Monitoring Failures       — detect mode logging with PHI protection
#   A10 SSRF                                — (partial: path traversal, command injection)
#
# PIPEDA/HIPAA Note: WAF logs never include parameter values or request bodies
# to prevent PHI from appearing in log files (NIST SP 800-53 AU-3, PIPEDA Principle 7).
#
# =============================================================================

# ---------------------------------------------------------------------------
# Mode: "enforce" (block matching requests) or "detect" (log only, don't block)
# ---------------------------------------------------------------------------
# NIST SI-4 recommends starting in monitoring mode to establish baseline.
# Run detect mode for 1-2 weeks in production, review waf.filter logs for
# false positives, tune relaxed paths, then switch to enforce.
waf.mode=detect

# ---------------------------------------------------------------------------
# Module toggles — enable or disable individual detection modules
# Each module maps to an OWASP CRS rule group (see header)
# ---------------------------------------------------------------------------
waf.module.sqli.enabled=true
waf.module.xss.enabled=true
waf.module.path-traversal.enabled=true
waf.module.command-injection.enabled=true
waf.module.scanner-detection.enabled=true
waf.module.request-limits.enabled=true
waf.module.protocol-enforcement.enabled=true
waf.module.header-injection.enabled=true

# ---------------------------------------------------------------------------
# Request limits (OWASP CRS 920xxx / NIST SI-10)
# ---------------------------------------------------------------------------
# Maximum URI length in characters (HTTP 414 if exceeded)
# NIST SP 800-44: limit URI length to prevent buffer overflow attempts
waf.limits.max-uri-length=2048

# Maximum number of request parameters (HTTP 413 if exceeded)
# OWASP CRS 920xxx: limits parameter pollution attacks
waf.limits.max-parameter-count=100

# Maximum length of any single parameter value in characters (HTTP 413 if exceeded)
# Set high to accommodate clinical notes and eform content (healthcare context)
waf.limits.max-parameter-value-length=65536

# ---------------------------------------------------------------------------
# Allowlisted paths — skip ALL WAF checks (OWASP CRS rule exclusions)
# These paths are matched as substrings of the request URI.
# Only static assets and framework endpoints that never process user input.
# ---------------------------------------------------------------------------
waf.allowlist.paths=/images/,/css/,/js/,/fonts/,/favicon.ico,/csrfguard

# ---------------------------------------------------------------------------
# Relaxed paths — healthcare content paths (OWASP CRS PL1 tuning)
#
# Injection pattern checks are skipped for POST body parameters on these paths.
# Structural checks (request limits, protocol enforcement, path traversal in
# URI) still apply. Query string parameters are still checked.
#
# Healthcare rationale (NIST SI-10 context-aware validation):
# Clinical notes, prescriptions, and eform content contain medical terminology
# that triggers false positives (e.g., "SELECT-ive serotonin reuptake
# inhibitor", "patient OR family history", "drop in blood pressure -- monitor").
# These endpoints have application-layer input validation (OWASP Encoder,
# parameterized queries) as defense-in-depth.
# ---------------------------------------------------------------------------
waf.relaxed.paths=/CaseManagementEntry.do,/CaseManagementView.do,/SaveNote.do,/oscarEncounter/,/eform/,/annotation/

# ---------------------------------------------------------------------------
# Hardened paths — pre-authentication and high-risk endpoints (NIST SC-7(5))
#
# These paths receive TIGHTER request limits than the global defaults:
#   - Lower parameter count (default: 10 vs global 100)
#   - Lower parameter value length (default: 1024 vs global 65536)
#   - Full injection pattern checks always apply (never relaxed)
#
# Rationale: Pre-auth endpoints are exposed to the internet without session
# validation. They accept minimal, well-structured input (credentials, lab
# file uploads, health card swipes). Large or numerous parameters on these
# paths are strong indicators of automated attacks.
#
# High-risk endpoints (admin, export, merge) handle operations where injection
# attacks have outsized impact (data exfiltration, record corruption).
# ---------------------------------------------------------------------------
waf.hardened.paths=/login.do,/logout.jsp,/forcepasswordreset.jsp,/lab/CMLlabUpload.do,/lab/newLabUpload.do,/mfa/,/admin/MergeRecords.do,/demographic/DemographicExport.do,/demographic/cihiExportOMD4.do,/report/GenerateSpreadsheet.do,/eformViewForPdfGenerationServlet,/EFormViewForPdfGenerationServlet
waf.hardened.max-parameter-count=10
waf.hardened.max-parameter-value-length=1024

# ---------------------------------------------------------------------------
# Scanner/bot detection (OWASP CRS 913xxx / NIST SI-3)
# Blocked User-Agent substrings (case-insensitive match)
# ---------------------------------------------------------------------------
waf.scanners=sqlmap,nikto,nmap,masscan,zgrab,nuclei,dirbuster,gobuster,wfuzz,hydra,burpsuite,zaproxy,w3af,arachni,skipfish,vega,grabber,fimap,commix
