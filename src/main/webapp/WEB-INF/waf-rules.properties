# ===========================================================================
# CARLOS EMR — WAF Rules Configuration
# ===========================================================================
#
# This file documents the WAF rule set alignment with security standards.
# Actual WAF component configuration is controlled via carlos.properties.
#
# Standards covered:
#
#   NIST SP 800-53 (Security and Privacy Controls):
#     SC-5   Denial-of-Service Protection      — rate limiting (RateLimitFilter, carlos.properties)
#     SC-7   Boundary Protection               — GeoIP filtering (GeoIpFilter, carlos.properties)
#     SC-8   Transmission Confidentiality      — HTTPS enforcement via Tomcat connector
#     SC-28  Protection of Information at Rest — encryption at rest (application layer)
#     SI-3   Malicious Code Protection         — request inspection (WafFilter, carlos.properties)
#     SI-4   System Monitoring                 — detect mode (all WAF filters)
#     SI-10  Information Input Validation      — input sanitisation (WafFilter)
#
#   OWASP Top 10 (2021):
#     A01 — Broken Access Control              — SecurityInfoManager privilege checks
#     A03 — Injection                          — parameterized queries, WafFilter SQLi rules
#     A07 — Identification and Authentication  — RateLimitFilter brute force protection
#
#   OWASP CRS (Core Rule Set):
#     912xxx — DoS Protection rules            — RateLimitFilter (WAF_RATE_LIMIT_*)
#     941xxx — XSS rules                       — WafFilter (WAF_ENABLED)
#     942xxx — SQLi rules                      — WafFilter (WAF_ENABLED)
#
#   OWASP ASVS 4.0:
#     §11.1.4 — Rate limiting on auth endpoints — RateLimitFilter path tiers
#
# ===========================================================================
# Filter Activation Summary
# ===========================================================================
#
# Component               Property Key            Default  Scope
# ----------------------  ----------------------  -------  -------
# RateLimitFilter         WAF_RATE_LIMIT_ENABLED  false    /*
# GeoIpFilter             WAF_GEOIP_ENABLED       false    /*
# WafFilter               WAF_ENABLED             false    /*
#
# All components disabled by default. Enable via carlos.properties.
#
# ===========================================================================
