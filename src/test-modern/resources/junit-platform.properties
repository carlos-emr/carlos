# JUnit 5 Parallel Execution Configuration
#
# Strategy: Unit tests run concurrently (thread-safe via Mockito 5.x thread-local MockedStatic).
# Integration tests remain sequential within each Surefire fork (isolated by @Transactional+@Rollback).
# Surefire forkCount provides process-level parallelism for integration tests.

# Enable parallel test execution
junit.jupiter.execution.parallel.enabled = true

# Default: methods within a class run sequentially (safe for shared test state)
junit.jupiter.execution.parallel.mode.default = same_thread

# Default: classes run sequentially unless overridden by @Execution(CONCURRENT)
junit.jupiter.execution.parallel.mode.classes.default = same_thread

# Fixed thread pool — matches available CPU cores in devcontainer
junit.jupiter.execution.parallel.config.strategy = fixed
junit.jupiter.execution.parallel.config.fixed.parallelism = 4

# Timeout for parallel execution (seconds)
junit.jupiter.execution.timeout.default = 60
